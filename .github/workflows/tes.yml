name: Android CI/CD Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch: # This allows manual triggering of the workflow

jobs:
  build:
    name: Build and Test Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK
        uses: actions/setup-java@v2
        with:
          java-version: '11' # You can specify the desired Java version
          distribution: 'adopt'
          architecture: 'x64'
          check-latest: false
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
          overwrite-settings: true
          job-status: success

      - name: Install Android SDK
        run: |
          wget https://dl.google.com/android/repository/commandlinetools-linux-7583922_latest.zip
          unzip commandlinetools-linux-7583922_latest.zip
          sudo mv cmdline-tools /usr/local
          echo 'export PATH="$PATH:/usr/local/cmdline-tools/tools/bin"' >> $HOME/.bashrc
          source $HOME/.bashrc

      - name: Accept Android licenses
        run: |
          export ANDROID_HOME=/usr/local/cmdline-tools/tools
          export PATH="$PATH:$ANDROID_HOME/bin"
          yes | sdkmanager --licenses

      - name: Set up emulator
        run: |
          sdkmanager "platform-tools" "platforms;android-30" "emulator" "system-images;android-30;google_apis;x86_64"
          echo no | avdmanager create avd -n test -k "system-images;android-30;google_apis;x86_64"
          emulator -avd test -no-skin -no-audio -no-window -port 5554 &
          echo "Waiting for emulator to start..."
          adb wait-for-device
          adb shell input keyevent 82

      - name: Install ngrok
        run: |
          wget https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-linux-amd64.zip
          unzip ngrok-stable-linux-amd64.zip
          sudo mv ngrok /usr/local/bin/
          ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }} # Set the NGROK_AUTH_TOKEN secret in your GitHub repository

      - name: Expose ADB and VNC ports with ngrok
        run: |
          ngrok tcp 5554 &>/dev/null &
          ngrok tcp 5555 &>/dev/null &
          sleep 5

      - name: Print ngrok URLs
        run: |
          echo "ADB URL: $(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')"
          echo "VNC URL: $(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[1].public_url')"

      - name: Build and test Android app
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug # or your desired Gradle command
          ./gradlew test # or your desired test command

      - name: Stop emulator
        run: adb emu kill

      - name: Stop ngrok
        run: pkill ngrok

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v2
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
      - name: Sleep to keep the workflow running
        run: |
          echo "Sleeping for 1 hour..."
          Start-Sleep -Seconds 3600
