name: Infinite Minecraft Server

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 43200

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Eclipse Temurin JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Verify Java
        run: |
          java -version
          javac -version

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y curl wget rsync python3-pip
          pip install -U huggingface_hub

      - name: HF Login
        run: |
          hf auth login --token "$HF_TOKEN"

      - name: Setup server files
        run: |
          mkdir -p random
          cd random

          curl -L -o random.jar \
            https://fill-data.papermc.io/v1/objects/830d4eb5c15cbd802a9ec9f2f54eaaaeb9511958339aec983fd0c88bad21d940/paper-26.1.2-64.jar

          echo "eula=true" > eula.txt

          cat > server.properties <<EOF
          online-mode=false
          EOF

          mkdir -p plugins

      - name: Restore bucket files
        run: |
          hf buckets sync \
            hf://buckets/djjzbx/random \
            ./random || true

      - name: Start sync daemon
        run: |
          cat > sync.sh <<'EOF'
          #!/bin/bash

          while true
          do
            hf buckets sync \
              ./random \
              hf://buckets/djjzbx/random

            sleep 120
          done
          EOF

          chmod +x sync.sh

          nohup ./sync.sh > sync.log 2>&1 &

      - name: Start Minecraft
        working-directory: random
        run: |
          java -Xmx12G -Xms2G -jar random.jar nogui
