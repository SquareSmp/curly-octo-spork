name: Infinite Minecraft Server

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  server:
    runs-on: ubuntu-latest

    # Max GitHub Actions limit
    timeout-minutes: 43200

    env:
      PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Install Temurin Java 25
      # ------------------------------------------------------------
      - name: Setup Eclipse Temurin JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Verify Java
        run: |
          java -version
          javac -version

      # ------------------------------------------------------------
      # Install tools
      # ------------------------------------------------------------
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y curl wget screen rsync python3-pip

          pip install -U huggingface_hub

      # ------------------------------------------------------------
      # Login to Hugging Face
      # ------------------------------------------------------------
      - name: HF Login
        run: |
          hf auth login --token "$HF_TOKEN"

      # ------------------------------------------------------------
      # Create server dir
      # ------------------------------------------------------------
      - name: Setup server files
        run: |
          mkdir -p random
          cd random

          # Download Paper
          curl -L -o random.jar \
            https://fill-data.papermc.io/v1/objects/830d4eb5c15cbd802a9ec9f2f54eaaaeb9511958339aec983fd0c88bad21d940/paper-26.1.2-64.jar

          # Download Playit
          curl -L -o playit-linux-amd64 \
            https://github.com/playit-cloud/playit-agent/releases/download/v0.15.23/playit-linux-amd64

          chmod +x playit-linux-amd64

          # EULA
          echo "eula=true" > eula.txt

          # Offline mode
          cat > server.properties <<EOF
          online-mode=false
          EOF

          mkdir -p plugins

      # ------------------------------------------------------------
      # Restore from HF bucket
      # ------------------------------------------------------------
      - name: Restore bucket files
        run: |
          hf buckets sync \
            hf://buckets/djjzbx/random \
            ./random || true

      # ------------------------------------------------------------
      # Start auto-sync loop
      # ------------------------------------------------------------
      - name: Start sync daemon
        run: |
          cat > sync.sh <<'EOF'
          #!/bin/bash

          while true
          do
            echo "Syncing to HF bucket..."

            hf buckets sync \
              ./random \
              hf://buckets/djjzbx/random

            sleep 120
          done
          EOF

          chmod +x sync.sh

          nohup ./sync.sh > sync.log 2>&1 &

      # ------------------------------------------------------------
      # Start Playit
      # ------------------------------------------------------------
      - name: Start Playit
        working-directory: random
        run: |
          nohup ./playit-linux-amd64 \
            --secret "$PLAYIT_SECRET" \
            --platform_docker \
            > playit.log 2>&1 &

      # ------------------------------------------------------------
      # Start Minecraft server
      # ------------------------------------------------------------
      - name: Start Minecraft
        working-directory: random
        run: |
          java -Xmx12G -Xms2G -jar random.jar nogui
